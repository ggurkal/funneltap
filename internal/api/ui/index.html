<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    document.documentElement.classList.add(
      matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
    );
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>funneltap</title>
  <link rel="stylesheet" href="vendor/pico.min.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header class="app-header">
    <h1>funneltap</h1>
    <p class="meta" id="status">loading…</p>
  </header>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-toolbar">
        <button type="button" class="secondary outline" id="clear-btn">Clear requests</button>
      </div>
      <ul class="request-list" id="request-list"></ul>
    </aside>

    <main class="detail" id="detail">
      <div class="detail-empty">Select a request from the list</div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
